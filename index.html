<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICAO 英语五级模拟测试</title>
<style>
  :root {
    --bg-primary: #0f172a;
    --bg-secondary: #1e293b;
    --bg-tertiary: #334155;
    --bg-user: #1d4ed8;
    --bg-ai: #1e293b;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent: #3b82f6;
    --accent-light: #60a5fa;
    --success: #22c55e;
    --error: #ef4444;
    --warning: #f59e0b;
    --border: #334155;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --radius: 16px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .header-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .header-info h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .header-info p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .header-badge {
    margin-left: auto;
    background: rgba(59,130,246,0.15);
    border: 1px solid rgba(59,130,246,0.3);
    color: var(--accent-light);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  /* Chat container */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    padding-bottom: 130px; /* 给底部固定输入框留空间 */
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .message {
    display: flex;
    gap: 12px;
    animation: fadeInUp 0.3s ease;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }

  .message.ai { align-items: flex-start; }
  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .ai .msg-avatar {
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  }

  .user .msg-avatar {
    background: var(--bg-tertiary);
    font-size: 14px;
  }

  .msg-bubble-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: calc(100% - 52px);
  }

  .user .msg-bubble-wrap { align-items: flex-end; }

  .msg-role {
    font-size: 11px;
    color: var(--text-muted);
    padding: 0 4px;
  }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.6;
    font-size: 14px;
  }

  .ai .msg-bubble {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .user .msg-bubble {
    background: var(--bg-user);
    border-top-right-radius: 4px;
    color: white;
  }

  .msg-bubble p { margin-bottom: 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }

  .msg-bubble strong { color: var(--accent-light); }
  .user .msg-bubble strong { color: #93c5fd; }

  /* Typing indicator */
  .typing-wrap {
    display: flex;
    gap: 5px;
    padding: 4px 0;
  }

  .typing-dot {
    width: 7px; height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Card styles */
  .info-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 8px;
  }

  .info-card h3 {
    font-size: 13px;
    color: var(--accent-light);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .info-card ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .info-card li {
    font-size: 13px;
    color: var(--text-secondary);
    padding-left: 16px;
    position: relative;
    line-height: 1.5;
  }

  .info-card li::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--accent);
  }

  /* Test card */
  .test-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-top: 8px;
    width: 100%;
  }

  .test-card .part-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 10px;
    font-weight: 600;
  }

  .test-card h3 {
    font-size: 16px;
    color: var(--text-primary);
    margin-bottom: 12px;
  }

  .test-card .instruction {
    font-size: 13px;
    color: var(--text-secondary);
    background: rgba(59,130,246,0.08);
    border-left: 3px solid var(--accent);
    padding: 10px 14px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin-bottom: 14px;
    line-height: 1.5;
  }

  /* Audio player simulation */
  .audio-sim {
    background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(59,130,246,0.05));
    border: 1px solid rgba(59,130,246,0.25);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .audio-sim:hover { background: rgba(59,130,246,0.2); }

  .audio-sim .play-btn {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: transform 0.2s;
  }

  .audio-sim.playing .play-btn { animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .audio-sim-text {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .audio-sim-text strong { color: var(--accent-light); display: block; margin-bottom: 2px; }

  /* Options */
  .options-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 12px;
  }

  .option-btn {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    text-align: left;
    font-size: 13px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(59,130,246,0.1);
  }

  .option-btn.selected {
    border-color: var(--accent);
    background: rgba(59,130,246,0.2);
  }

  .option-btn.correct {
    border-color: var(--success);
    background: rgba(34,197,94,0.15);
  }

  .option-btn.wrong {
    border-color: var(--error);
    background: rgba(239,68,68,0.15);
  }

  .option-btn .opt-letter {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--bg-secondary);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .option-btn.selected .opt-letter { background: var(--accent); color: white; }
  .option-btn.correct .opt-letter { background: var(--success); color: white; }
  .option-btn.wrong .opt-letter { background: var(--error); color: white; }

  /* Text input */
  .text-input-wrap {
    margin-top: 12px;
  }

  .text-input-wrap label {
    font-size: 12px;
    color: var(--text-muted);
    display: block;
    margin-bottom: 6px;
  }

  .text-input-wrap textarea {
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    padding: 10px 14px;
    font-size: 13px;
    font-family: inherit;
    resize: none;
    min-height: 80px;
    transition: border-color 0.2s;
    outline: none;
  }

  .text-input-wrap textarea:focus { border-color: var(--accent); }
  .text-input-wrap textarea::placeholder { color: var(--text-muted); }

  /* Submit button */
  .submit-btn {
    margin-top: 12px;
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    font-family: inherit;
  }

  .submit-btn:hover:not(:disabled) { background: var(--accent-light); }
  .submit-btn:active:not(:disabled) { transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Feedback box */
  .feedback-box {
    border-radius: var(--radius);
    padding: 14px;
    margin-top: 12px;
    font-size: 13px;
    line-height: 1.6;
  }

  .feedback-box.correct {
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.3);
  }

  .feedback-box.wrong {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
  }

  .feedback-box.neutral {
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.3);
  }

  .feedback-title {
    font-weight: 700;
    margin-bottom: 6px;
  }

  .feedback-box.correct .feedback-title { color: var(--success); }
  .feedback-box.wrong .feedback-title { color: var(--error); }
  .feedback-box.neutral .feedback-title { color: var(--accent-light); }

  /* Progress bar */
  .progress-bar-wrap {
    padding: 12px 24px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .progress-track {
    height: 4px;
    background: var(--bg-tertiary);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Report card */
  .report-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-top: 8px;
  }

  .report-header {
    text-align: center;
    margin-bottom: 20px;
  }

  .report-header .score-big {
    font-size: 48px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent-light), var(--success));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }

  .report-header p { font-size: 14px; color: var(--text-secondary); margin-top: 6px; }

  .report-dimensions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .dim-item {
    background: var(--bg-tertiary);
    border-radius: var(--radius-sm);
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dim-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .dim-icon.excellent { background: rgba(34,197,94,0.2); }
  .dim-icon.good { background: rgba(59,130,246,0.2); }
  .dim-icon.weak { background: rgba(239,68,68,0.2); }

  .dim-text { flex: 1; min-width: 0; }
  .dim-name { font-size: 12px; color: var(--text-secondary); }
  .dim-score { font-size: 15px; font-weight: 700; margin-top: 2px; }
  .dim-score.excellent { color: var(--success); }
  .dim-score.good { color: var(--accent-light); }
  .dim-score.weak { color: var(--error); }

  .report-recommendations {
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: var(--radius);
    padding: 16px;
  }

  .report-recommendations h4 {
    font-size: 13px;
    color: var(--accent-light);
    margin-bottom: 10px;
  }

  .report-recommendations ol {
    padding-left: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .report-recommendations li { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

  .restart-btn {
    margin-top: 16px;
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent-light);
    padding: 10px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .restart-btn:hover { background: rgba(59,130,246,0.1); }

  /* Dimension explain */
  .dim-explain {
    margin-top: 16px;
    padding: 14px;
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .dim-explain strong { color: var(--warning); }

  /* Next btn */
  .next-btn {
    margin-top: 12px;
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 28px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
  }

  .next-btn:hover { background: var(--accent-light); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    #chat { padding: 16px; }
    .report-dimensions { grid-template-columns: 1fr; }
    .msg-bubble { font-size: 13px; }
    .header-badge { display: none; }
  }

  /* Level band display */
  .level-band {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(59,130,246,0.1));
    border: 1px solid rgba(34,197,94,0.3);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    color: var(--success);
    margin: 8px 0;
  }

  /* Phase indicator */
  .phase-badge {
    display: inline-block;
    background: rgba(59,130,246,0.15);
    color: var(--accent-light);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .code-block {
    background: var(--bg-tertiary);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    color: #93c5fd;
    margin: 8px 0;
    border-left: 3px solid var(--accent);
  }

  .highlight-text { color: #fbbf24; font-weight: 600; }

  .warning-box {
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 12px;
    color: var(--text-secondary);
    margin: 10px 0;
    line-height: 1.6;
  }

  .warning-box strong { color: var(--warning); }
</style>
</head>
<body>

<header>
  <div class="header-icon">✈️</div>
  <div class="header-info">
    <h1>ICAO 英语五级模拟测试</h1>
    <p>基于 ICAO Doc 9835 &amp; ICAO 900 核心句型</p>
  </div>
  <div class="header-badge">Level 5 Pilot</div>
</header>

<div id="chat"></div>

<div class="progress-bar-wrap" id="progressWrap" style="display:none;">
  <div class="progress-info">
    <span id="progressLabel">测试进度</span>
    <span id="progressCount">0 / 12</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const TOTAL_QUESTIONS = 12;
let state = {
  phase: 'intro',        // intro | structure | test | report
  currentPart: 0,        // 0-5 (six parts)
  currentQ: 0,           // question index within part
  answers: {},          // { qIndex: answer }
  scores: {             // scores per part
    pronunciation: [],
    structure: [],
    vocabulary: [],
    fluency: [],
    comprehension: [],
    interaction: []
  },
  scores_by_part: [],
  inputMode: null,      // 'choice' | 'text' | 'choice-or-text'
  selectedOption: null,
  submitted: false,
  currentTranscript: '',
  audioPlaying: false
};

// ============================================================
// CONTENT DATABASE
// ============================================================
const PARTS = [
  {
    name: 'Part 1',
    title: '听力理解 Listening Comprehension',
    description: '你将听到一段飞行员与管制员之间的通话。从三个选项中选出正确答案。',
    instruction: '请仔细听题，点击播放按钮后选择正确答案。',
    icon: '🎧',
    questions: [
      {
        audio: 'Nanjing Tower, CES 302, descending FL100, runway 27 approach.',
        question: '飞行员正在做什么？',
        options: ['正在离场', '正在进近着陆', '正在巡航'],
        correct: 1,
        dimension: 'comprehension',
        feedback: {
          correct: '正确！这是一段进近通信，CES302 正在使用27号跑道进近。关键词：descending FL100, runway 27 approach。',
          wrong: '这是一段进近通信。CES302 正在下降到FL100（10000英尺），使用27号跑道进近。关键词：descending FL100, runway 27 approach。'
        }
      },
      {
        audio: 'Speedbird 178, reduce to minimum clean, expect vectoring for ILS runway 27.',
        question: '管制员要求 Speedbird 178 做什么？',
        options: ['增加速度', '减小到最小速度，配置光洁形态', '保持当前速度'],
        correct: 1,
        dimension: 'comprehension',
        feedback: {
          correct: '正确！reduce to minimum clean 表示减小到最小速度，收取起落架和襟翼（光洁形态）。这是五级听力中的核心词汇。',
          wrong: 'reduce to minimum clean 是 ICAO 标准用语，意为"减小到最小速度，配置光洁形态"。这是飞行员进近中调整速度的常见指令。'
        }
      }
    ]
  },
  {
    name: 'Part 2',
    title: '口语复述 Oral Production',
    description: '你将听到一段通话。请用英语复述听到的内容，或用自己的话简短描述。',
    instruction: '请仔细听题，然后在下方的文本框中输入你的复述（可用自己的措辞）。',
    icon: '🎙️',
    questions: [
      {
        audio: 'Air China 888, descend to FL100, maintain speed 250 knots or less until intercepting the ILS.',
        question: '请复述或描述这段通话的大意：',
        instruction: 'CA888，描述管制员给出了什么指令？你也可以用不同措辞表达相同意思。',
        type: 'text',
        sampleAnswer: 'Air China 888 was instructed to descend to flight level 100 and maintain speed 250 knots or less until intercepting the ILS approach.',
        dimension: 'fluency',
        keywords: ['descend', 'FL100', 'speed', '250 knots', 'ILS'],
        feedback: {
          correct: '很好！你的复述准确捕捉了核心信息。标准复述：降高度至FL100，保持速度250节以下直到截获ILS。',
          wrong: '提示：这段通话包含以下关键信息——下降至FL100，保持250节或以下，直到截获ILS。可关注：descend / maintain / intercepting 这些核心词汇。'
        }

// ============================================================
// DOM helpers
// ============================================================
const chat = document.getElementById('chat');
const progressWrap = document.getElementById('progressWrap');

function scrollBottom() {
  chat.scrollTop = chat.scrollHeight;
}

function updateProgress(current, total) {
  const pct = (current / total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = current + ' / ' + total;
}

function makeMsg(cls, avatar, role, html, extraClass = '') {
  const div = document.createElement('div');
  div.className = 'message ' + cls;
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble-wrap">
      <div class="msg-role">${role}</div>
      <div class="msg-bubble ${extraClass}">${html}</div>
    </div>`;
  return div;
}

function addMsg(cls, avatar, role, html, extraClass = '') {
  const m = makeMsg(cls, avatar, role, html, extraClass);
  chat.appendChild(m);
  scrollBottom();
  return m;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typingEl';
  div.innerHTML = `
    <div class="msg-avatar">✈️</div>
    <div class="msg-bubble-wrap">
      <div class="msg-role">AI 考官</div>
      <div class="msg-bubble">
        <div class="typing-wrap">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>`;
  chat.appendChild(div);
  scrollBottom();
  return div;
}

function removeTyping() {
  const el = document.getElementById('typingEl');
  if (el) el.remove();
}

// Typewriter effect
function typewrite(element, text, speed = 18) {
  return new Promise(resolve => {
    let i = 0;
    element.innerHTML = '';
    function step() {
      if (i < text.length) {
        // Handle HTML tags
        if (text[i] === '<') {
          let tag = '';
          while (i < text.length && text[i] !== '>') tag += text[i++];
          tag += '>';
          i++;
          element.innerHTML += tag;
        } else {
          element.innerHTML += text[i++];
        }
        scrollBottom();
        setTimeout(step, speed);
      } else {
        resolve();
      }
    }
    step();
  });
}

// ============================================================
// AUDIO SIMULATION (Web Speech API)
// ============================================================
function speakText(text, callback) {
  if (!('speechSynthesis' in window)) {
    callback && callback();
    return;
  }
  // Cancel any ongoing speech
  window.speechSynthesis.cancel();
  
  // On mobile, voices may not be loaded yet - wait for them
  const voices = window.speechSynthesis.getVoices();
  
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 0.85;
  utt.pitch = 1;
  
  // Try to find a good English voice (prefer Google/Apple voices)
  const preferredVoices = [
    'Google US English', 'Google UK English', 'Samantha', 'Daniel', 
    'Karen', 'Tessa', 'Zira', 'Microsoft David', 'Microsoft Zira',
    'Alex', 'Allison', 'Ava', 'Victoria'
  ];
  let voice = voices.find(v => v.lang.startsWith('en') && preferredVoices.some(pv => v.name.includes(pv)));
  if (!voice) voice = voices.find(v => v.lang.startsWith('en'));
  if (voice) utt.voice = voice;
  
  utt.onend = callback;
  utt.onerror = function(e) {
    console.warn('Speech synthesis error:', e.error);
    callback && callback();
  };
  
  window.speechSynthesis.speak(utt);
}

// ============================================================
// ASYNC MESSAGE WITH TYPING
// ============================================================
async function aiSay(html, delay = 400) {
  await sleep(delay);
  const typingEl = addTyping();
  await sleep(500);
  removeTyping();
  const m = addMsg('ai', '✈️', 'AI 考官', '');
  const bubble = m.querySelector('.msg-bubble');
  await typewrite(bubble, html);
  return m;
}

async function aiSayImmediate(html) {
  const m = addMsg('ai', '✈️', 'AI 考官', '');
  const bubble = m.querySelector('.msg-bubble');
  bubble.innerHTML = html;
  scrollBottom();
  return m;
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

  } else if (isText && !q.topics) {

function selectTopic(idx, text) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('topic' + idx).classList.add('selected');
  state.currentTranscript = text;
}

let currentAudioText = '';
// Global audio element for better playback
let currentAudioEl = null;

function playAudio(el) {
  const part = PARTS[state.currentPart];
  const q = part.questions[state.currentQ];
  currentAudioText = q.audio;

  if (state.audioPlaying) {
    // Stop current playback
    if (currentAudioEl) {
      currentAudioEl.pause();
      currentAudioEl = null;
    }
    window.speechSynthesis.cancel();
    state.audioPlaying = false;
    el.classList.remove('playing');
    const btn = el.querySelector('.play-btn');
    if (btn) {
      btn.textContent = '▶';
      btn.style.animation = '';
    }
    const status = el.querySelector('.audio-status');
    if (status) status.textContent = '点击重新播放';
    return;
  }

  // Start playing
  el.classList.add('playing');
  const btn = el.querySelector('.play-btn');
  if (btn) {
    btn.textContent = '⏸';
    btn.style.animation = 'pulse 1s infinite';
  }
  const status = el.querySelector('.audio-status');
  if (status) status.textContent = '正在播放...';

  state.audioPlaying = true;

  // Try Web Speech API (works on mobile too)
  speakText(q.audio, () => {
    if (state.audioPlaying) {
      // Only reset if we're still on this question
      const part2 = PARTS[state.currentPart];
      const q2 = part2.questions[state.currentQ];
      if (q2.audio === currentAudioText) {
        state.audioPlaying = false;
        el.classList.remove('playing');
        const btn2 = el.querySelector('.play-btn');
        if (btn2) {
          btn2.textContent = '▶';
          btn2.style.animation = '';
        }
        const status2 = el.querySelector('.audio-status');
        if (status2) status2.textContent = '播放完毕，可提交答案';
      }
    }
  });
}

function selectOption(idx) {
  if (state.submitted) return;
  state.selectedOption = idx;
  document.querySelectorAll('.option-btn').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
  });
  const submitBtn = document.getElementById('submitBtn');
  if (submitBtn) {
    submitBtn.disabled = false;
    submitBtn.style.opacity = '1';
    submitBtn.style.cursor = 'pointer';
  }
}

function submitChoice() {
  if (state.submitted || state.selectedOption === null) return;
  state.submitted = true;

  const part = PARTS[state.currentPart];
  const q = part.questions[state.currentQ];
  const isCorrect = state.selectedOption === q.correct;
  const qIndex = state.scores_by_part.slice(0, state.currentPart).reduce((a, p) => a + p.total, 0) + state.currentQ;

  state.answers[qIndex] = state.selectedOption;
  state.scores_by_part[state.currentPart].correct += isCorrect ? 1 : 0;

  // Style options
  document.querySelectorAll('.option-btn').forEach((b, i) => {
    b.style.cursor = 'default';
    if (i === q.correct) b.classList.add('correct');
    else if (i === state.selectedOption) b.classList.add('wrong');
  });

  // Add feedback
  const fb = document.createElement('div');
  const fbClass = isCorrect ? 'correct' : 'wrong';
  fb.className = `feedback-box ${fbClass}`;
  fb.innerHTML = `
    <div class="feedback-title">${isCorrect ? '✅ 正确！' : '❌ 不正确'}</div>
    <div>${isCorrect ? q.feedback.correct : q.feedback.wrong}</div>
  `;
  const qCard = document.getElementById('qCard');
  if (qCard) qCard.appendChild(fb);

  // Next button
  const btn = document.createElement('button');
  btn.className = 'next-btn';
  btn.textContent = getNextLabel();
  btn.onclick = nextQuestion;
  const qCard2 = document.getElementById('qCard');
  if (qCard2) qCard2.appendChild(btn);
  scrollBottom();
}

function submitText() {
  if (state.submitted) return;
  const part = PARTS[state.currentPart];
  const q = part.questions[state.currentQ];
  const input = document.getElementById('userText');
  const text = (input.value || '').trim();

  state.submitted = true;
  state.answers['text_' + state.currentPart + '_' + state.currentQ] = text;

  // Simple keyword check for scoring
  let isCorrect = false;
  if (q.keywords) {
    const found = q.keywords.filter(k => text.toLowerCase().includes(k.toLowerCase()));
    isCorrect = found.length >= Math.ceil(q.keywords.length * 0.5);
  } else {
    isCorrect = text.length > 30;
  }

  const qIndex = state.scores_by_part.slice(0, state.currentPart).reduce((a, p) => a + p.total, 0) + state.currentQ;
  state.scores_by_part[state.currentPart].correct += isCorrect ? 1 : 0;

  const fb = document.createElement('div');
  const fbClass = isCorrect ? 'correct' : 'neutral';
  fb.className = `feedback-box ${fbClass}`;
  fb.innerHTML = `
    <div class="feedback-title">${isCorrect ? '✅ 回答良好！' : '📝 已收到回答'}</div>
    <div>${q.feedback.wrong}</div>
    ${q.sampleAnswer ? `<div style="margin-top:8px;font-size:12px;color:var(--text-muted)"><strong>参考回答：</strong><span class="code-block" style="margin-top:4px">${q.sampleAnswer}</span></div>` : ''}
  `;
  document.getElementById('qCard').appendChild(fb);

  const btn = document.createElement('button');
  btn.className = 'next-btn';
  btn.textContent = getNextLabel();
  btn.onclick = nextQuestion;
  document.getElementById('qCard').appendChild(btn);
  input.disabled = true;
  scrollBottom();
}

function getNextLabel() {
  const part = PARTS[state.currentPart];
  const isLastQ = state.currentQ >= part.questions.length - 1;
  const isLastPart = state.currentPart >= PARTS.length - 1;
  if (isLastQ && isLastPart) return '📊 查看测试报告';
  if (isLastQ) return '▶ 下一部分 →';
  return '▶ 下一题 →';
}

function nextQuestion() {
  const part = PARTS[state.currentPart];

  if (state.currentQ < part.questions.length - 1) {
    // Next question in same part
    state.currentQ++;
    const qIndex = state.scores_by_part.slice(0, state.currentPart).reduce((a, p) => a + p.total, 0) + state.currentQ;
    updateProgress(qIndex, TOTAL_QUESTIONS);
    renderPartIntro();
  } else if (state.currentPart < PARTS.length - 1) {
    // Next part
    state.currentPart++;
    state.currentQ = 0;
    const qIndex = state.scores_by_part.slice(0, state.currentPart).reduce((a, p) => a + p.total, 0);
    updateProgress(qIndex, TOTAL_QUESTIONS);
    renderPartIntro();
  } else {
    // Done! Show report
    updateProgress(TOTAL_QUESTIONS, TOTAL_QUESTIONS);
    showReport();
  }
}

async function showReport() {
  state.phase = 'report';
  progressWrap.style.display = 'none';

  await aiSay(`<div class="phase-badge">测试完成</div><p>🎉 所有测试部分已完成！正在生成你的薄弱维度分析报告...</p>`, 500);

  const total = state.scores_by_part.reduce((a, p) => a + p.total, 0);
  const correct = state.scores_by_part.reduce((a, p) => a + p.correct, 0);
  const pct = Math.round((correct / total) * 100);

  // Determine scores per dimension
  const dimScores = {
    pronunciation: { score: 0, label: '发音', icon: '🔊', desc: 'Pronunciation' },
    structure: { score: 0, label: '结构', icon: '🏗️', desc: 'Structure' },
    vocabulary: { score: 0, label: '词汇', icon: '📚', desc: 'Vocabulary' },
    fluency: { score: 0, label: '流利度', icon: '⚡', desc: 'Fluency' },
    comprehension: { score: 0, label: '理解力', icon: '🧠', desc: 'Comprehension' },
    interaction: { score: 0, label: '互动能力', icon: '🔗', desc: 'Interaction' }
  };

  // Map parts to dimensions
  const dimMap = {
    0: 'comprehension',
    1: 'fluency',
    2: 'vocabulary',
    3: 'structure',
    4: 'interaction',
    5: 'fluency'
  };

  state.scores_by_part.forEach((p, i) => {
    const dim = dimMap[i];
    if (dim && dimScores[dim]) {
      const dimPct = Math.round((p.correct / p.total) * 100);
      dimScores[dim].score = dimPct;
    }
  });

  // Generate recommendations based on weakest dimensions
  const sorted = Object.entries(dimScores).sort((a, b) => a[1].score - b[1].score);
  const weakest = sorted.slice(0, 2);
  const levelScore = pct;

  let levelText = '';
  if (levelScore >= 85) levelText = '建议达到 Level 5';
  else if (levelScore >= 65) levelText = '建议达到 Level 4，冲击 Level 5';
  else levelText = '建议从 Level 3/4 开始系统学习';

  const recommendations = [];
  if (weakest[0][0] === 'vocabulary' || weakest[0][0] === 'interaction') {
    recommendations.push('重点练习 <strong>Paraphrasing（同义改写）</strong>，这是 ICAO 五级的核心区分项，建议每天练习5句 ICAO 900 句型的改写');
  }
  if (weakest[0][0] === 'fluency' || weakest[0][0] === 'comprehension') {
    recommendations.push('多听真实的 <strong>ATC 通话录音</strong>（如 LiveATC.net），每天至少15分钟，熟悉不同口音和语速');
  }
  if (weakest[0][0] === 'structure' || weakest[0][0] === 'pronunciation') {
    recommendations.push('复习 <strong>ICAO 标准通话用语</strong>（ICAO Doc 9432），重点练习复诵格式和数字读法');
  }
  if (recommendations.length === 0) {
    recommendations.push('继续强化 <strong>Paraphrasing</strong> 能力，每天用 ICAO 900 练习同义改写');
    recommendations.push('多进行<strong>模拟对话</strong>，与语言伙伴或 AI 练习真实 ATC 场景');
  }
  recommendations.push('建议使用 <strong>艾宾浩斯记忆曲线</strong>复习，每天3次，每次间隔1h/6h/24h');

  const dimItems = Object.entries(dimScores).map(([key, val]) => {
    let cls = 'weak';
    if (val.score >= 80) cls = 'excellent';
    else if (val.score >= 60) cls = 'good';
    return `
      <div class="dim-item">
        <div class="dim-icon ${cls}">${val.icon}</div>
        <div class="dim-text">
          <div class="dim-name">${val.desc}</div>
          <div class="dim-score ${cls}">${val.score >= 0 ? val.score + '%' : '-'}</div>
        </div>
      </div>`;
  }).join('');

  const reportHtml = `
    <div class="report-card">
      <div class="report-header">
        <div class="score-big">${pct}%</div>
        <p>测试总分（参考）</p>
        <div class="level-band">${levelText}</div>
        <p style="font-size:11px;color:var(--text-muted);margin-top:4px">
          ICAO 五级有效期 6 年 · 三级有效期 3 年 · 五级显著提升职业竞争力
        </p>
      </div>
      <h3 style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">📊 各维度得分</h3>
      <div class="report-dimensions">${dimItems}</div>
      <div class="report-recommendations">
        <h4>📋 后续学习重点建议</h4>
        <ol>
          ${recommendations.map(r => `<li>${r}</li>`).join('')}
        </ol>
      </div>
      <div class="dim-explain">
        <strong>💡 ICAO Level 4 vs Level 5 核心差异：</strong><br>
        Level 4 考生能"正确使用标准 ICAO 措辞"；<br>
        Level 5 考生必须能"灵活运用多种表达方式传递相同信息"——即 <strong>Paraphrasing</strong> 能力，这是五级最核心的评估标准（ICAO Doc 9835, Section 4.3.2）。
      </div>
      <button class="restart-btn" onclick="restartTest()">🔄 重新开始测试</button>
    </div>`;

  await aiSayImmediate(reportHtml);
}

function restartTest() {
  chat.innerHTML = '';
  state = {
    phase: 'intro',
    currentPart: 0,
    currentQ: 0,
    answers: {},
    scores_by_part: [],
    inputMode: null,
    selectedOption: null,
    submitted: false,
    currentTranscript: '',
    audioPlaying: false
  };
  renderIntro();
}

// ============================================================
// INPUT HANDLER
// ============================================================
document.getElementById('chat').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    const active = document.activeElement;
    if (active && active.tagName === 'TEXTAREA') return;
  }
});

function handleUserInput(text) {
  const trimmed = (text || '').trim().toLowerCase();

  if (state.phase === 'intro') {
    if (trimmed.includes('开始') || trimmed.includes('考5') || trimmed.includes('考五') || trimmed.includes('test') || trimmed.includes('start')) {
      renderStructure();
    } else {
      addMsg('user', '👤', '你', text);
      aiSay(`<p>请输入 <strong>"开始测试"</strong> 或 <strong>"考5级"</strong> 开始模拟测试！</p>`);
    }
  } else if (state.phase === 'structure') {
    if (trimmed.includes('开始') || trimmed.includes('好') || trimmed.includes('是') || trimmed.includes('ok') || trimmed.includes('yes') || trimmed.includes('y')) {
      addMsg('user', '👤', '你', text);
      startTest();
    } else {
      addMsg('user', '👤', '你', text);
      aiSay(`<p>准备好了吗？输入 <strong>"开始"</strong> 即可正式进入测试！</p>`);
    }
  } else if (state.phase === 'test') {
    // During test, show user's typed answer as text submission if needed
    if (text.trim()) {
      addMsg('user', '👤', '你', text);
    }
  } else if (state.phase === 'report') {
    if (trimmed.includes('重新') || trimmed.includes('restart') || trimmed.includes('再来')) {
      restartTest();
    } else {
      addMsg('user', '👤', '你', text);
      aiSay(`<p>测试已完成！点击下方按钮可以 <strong>重新开始测试</strong>，或继续了解更多 ICAO 英语学习建议。</p>`);
    }
  }
}

// Expose to global for onclick handlers
window.selectOption = selectOption;
window.submitChoice = submitChoice;
window.submitText = submitText;
window.nextQuestion = nextQuestion;
window.playAudio = playAudio;
window.selectTopic = selectTopic;
window.restartTest = restartTest;
window.handleUserInput = handleUserInput;

// Input bar
const inputBar = document.createElement('div');
inputBar.style.cssText = `
  position: fixed; bottom: 60px; left: 0; right: 0;
  background: var(--bg-secondary); border-top: 1px solid var(--border);
  padding: 12px 20px; display: flex; gap: 10px; flex-shrink: 0;
  max-width: 820px; margin: 0 auto; z-index: 100;`;
inputBar.innerHTML = `
  <input id="userInput" type="text" placeholder="输入你的回答..." autocomplete="off"
    style="flex:1;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:24px;
    color:var(--text-primary);padding:10px 16px;font-size:14px;font-family:inherit;outline:none;
    transition:border-color 0.2s;" />`;
document.body.appendChild(inputBar);

const userInput = document.getElementById('userInput');
userInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const val = this.value.trim();
    if (!val) return;
    addMsg('user', '👤', '你', val);
    this.value = '';
    handleUserInput(val);
  }
});
userInput.addEventListener('focus', function() { this.style.borderColor = 'var(--accent)'; });
userInput.addEventListener('blur', function() { this.style.borderColor = 'var(--border)'; });

// ============================================================
// INIT
// ============================================================
// Load voices
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

renderIntro();
</script>
